<!DOCTYPE HTML>
<html lang="zh-TW">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>報名截止 - 德天宮 媽祖遶境</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style type="text/css">
body {
  background-color: #f2f2f2;
  font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.bg-mazu-red {
  background: linear-gradient(145deg, #a61d24 0%, #80151a 100%);
  color: white;
}
.closed-icon {
  font-size: 5rem;
  color: #6c757d;
}
.btn-home {
  background-color: #a61d24;
  color: white;
  border: none;
  padding: 12px 30px;
  border-radius: 50px;
  text-decoration: none;
  transition: all 0.3s;
}
.btn-home:hover {
  background-color: #80151a;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0 rounded-4 overflow-hidden text-center">
        <div class="bg-mazu-red p-4">
          <h1 class="h3 fw-bold mb-0">報名已截止</h1>
        </div>
        <div class="card-body p-5">
          <i class="bi bi-calendar-x-fill closed-icon mb-4 d-block"></i>
          <h2 class="h4 fw-bold mb-3">115年度 報名作業已結束</h2>
          <p class="text-secondary mb-5">感謝您的關注，德天宮媽祖遶境報名期限已過 (4/12 截止)。<br>如有緊急事宜，請直接洽詢德天宮服務處。</p>
          <a href="https://www.facebook.com/" class="btn-home mb-3 d-inline-block">前往德天宮臉書</a>
          <p class="small text-muted mt-3"><span id="timer">5</span> 秒後將自動跳轉...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  let timeLeft = 5;
  const timerElement = document.getElementById('timer');
  const countdown = setInterval(function() {
    timeLeft--;
    timerElement.textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(countdown);
      window.location.href = 'https://www.facebook.com/';
    }
  }, 1000);
</script>
</body>
</html>
